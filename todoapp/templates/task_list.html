{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To-Do List</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container">

    <div class="top-section">

        <h1>My Tasks</h1>

        <a href="/add/" class="add-btn">
            + Add Task
        </a>

    </div>

    <div class="task-list">

        {% for task in tasks %}

        <div class="task-card">

            <div class="task-info">

                <h3>{{ task.title }}</h3>

                {% if task.completed %}

                    <span class="completed">
                        Completed
                    </span>

                {% else %}

                    <span class="pending">
                        Pending
                    </span>

                {% endif %}

            </div>

            <div class="task-actions">

                <a href="/edit/{{ task.id }}/" class="edit-btn">
                    Edit
                </a>

                <a href="/delete/{{ task.id }}/" class="delete-btn">
                    Delete
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
