databases:
  - name: todo_db
    databaseName: todo_db
    user: todo_user

services:
  - type: web
    name: todo_web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn todo_project.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
